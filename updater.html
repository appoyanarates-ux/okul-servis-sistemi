<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>AyPro X Güncelleniyor</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a2e;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      -webkit-user-select: none;
      -webkit-app-region: drag;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #4ade80; /* emerald-400 */
    }

    .message {
      font-size: 14px;
      margin-bottom: 15px;
      color: #94a3b8; /* slate-400 */
    }

    .progress-container {
      width: 100%;
      height: 8px;
      background-color: #334155; /* slate-700 */
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10b981, #34d399); /* emerald-500 to emerald-400 */
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .info {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #64748b; /* slate-500 */
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: #4ade80;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <div class="logo">AyPro X</div>
    <div class="message" id="message">Güncelleme kontrol ediliyor...</div>
    
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    
    <div class="info">
      <span id="speed">0 MB/s</span>
      <span id="percentage">0%</span>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const messageEl = document.getElementById('message');
    const progressBarEl = document.getElementById('progress-bar');
    const speedEl = document.getElementById('speed');
    const percentageEl = document.getElementById('percentage');

    ipcRenderer.on('update-message', (event, text) => {
      messageEl.innerText = text;
    });

    ipcRenderer.on('download-progress', (event, progressObj) => {
      messageEl.innerText = 'Güncelleme indiriliyor... Lütfen bekleyiniz.';
      
      const percent = Math.round(progressObj.percent);
      const speedMB = (progressObj.bytesPerSecond / 1024 / 1024).toFixed(2);
      
      progressBarEl.style.width = percent + '%';
      percentageEl.innerText = percent + '%';
      speedEl.innerText = speedMB + ' MB/s';
    });
  </script>
</body>
</html>
